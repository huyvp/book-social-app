server:
  port: 8084
  servlet:
    context-path: /file
spring:
  application:
    name: file-service
  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/file-service?authSource=admin
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

application:
  file:
    upload-dir: Downloads/staticStore  # folder name where files will be stored
    download-prefix: http://localhost:9000/api/v1/file/download/